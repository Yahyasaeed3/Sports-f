<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bristol Sports Facilities Map</title>

  <link rel="stylesheet" href="style.css">
  <script src="scripts.js" defer></script>

  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: row;
    }

    #map-container {
      width: 70%;
      height: 100vh;
    }

    #map-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    #data-container {
      width: 30%;
      height: 100vh;
      overflow-y: auto;
      padding: 10px;
      background-color: #f0f0f0;
      color: black;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #ccc;
    }

    th {
      background-color: #ddd;
    }
  </style>
</head>

<body>


  <div id="map-container">
    <iframe id="bristolMap"
      src="https://www.google.com/maps?q=sports facilities Bristol&output=embed">
    </iframe>
  </div>

  <div id="data-container">
    <h2>Sports Facilities</h2>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Type</th>
          <th>Address</th>
        </tr>
      </thead>
      <tbody id="map-results"></tbody>
    </table>
  </div>


  <script>
    async function loadSportsData() {

      const API_URL =
        "https://maps2.bristol.gov.uk/server2/rest/services/ext/ll_leisure/MapServer/0/query?where=1=1&outFields=*&outSR=4326&f=json";

      try {
        const res = await fetch(
          "https://api.allorigins.win/raw?url=" + encodeURIComponent(API_URL)
        );

        const data = await res.json();
        const features = data.features || [];

        const table = document.getElementById("map-results");
        table.innerHTML = "";

        let firstPlace = "sports facilities Bristol";

        features.forEach((f, i) => {
          const a = f.attributes || {};

          const name = a.NAME || a.FACILITY || a.TITLE || "Unknown";
          const type = a.TYPE || a.DESCRIPTION || "Unknown";
          const address = a.ADDRESS || a.STREET || a.LOCALITY || "Bristol";

        
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${name}</td>
            <td>${type}</td>
            <td>${address}</td>
          `;
          table.appendChild(row);

          if (i === 0) {
            firstPlace = name + " Bristol";
          }
        });

        
        document.getElementById("bristolMap").src =
          "https://www.google.com/maps?q=" +
          encodeURIComponent(firstPlace) +
          "&output=embed";

      } catch (err) {
        console.error("Error loading data:", err);
      }
    }

    window.onload = loadSportsData;
  </script>

</body>
</html>
