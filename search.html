<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Sports Facilities Search</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="preconnect" href="https://fonts.gstatic.com"> 
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Roboto+Slab:wght@100..900&display=swap">
    <script src="scripts.js" defer></script>
  </head>  
  <body>
    <div class="grid-container">
      <header>
        <span class="heading"><a href="index.html">Sports Facilities</a></span>
        <form class="search" action="search.html">
          <input name="searchterm" placeholder="Search.." type="text">
          <button type="submit"><i class="fa fa-search"></i></button>
        </form>
      </header>

      <nav class="w3-container w3-margin">
        <button onclick="location.href='map.html'" class="w3-button w3-block w3-blue w3-margin-top">Find on Map</button>
        <button onclick="location.href='search.html'" class="w3-button w3-block w3-blue w3-margin-top">Search Facilities</button>
      </nav>

      <main>
        <table class="w3-table w3-bordered">
          <thead>
            <tr><th>Name</th><th>Type</th><th>Address</th></tr>
          </thead>
          <tbody id="results"></tbody>
        </table>
      </main>
    </div>
  </body>
</html>
